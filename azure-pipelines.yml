trigger:
  branches:
    include:
      - main

pool:
  vmImage: ubuntu-latest

variables:
  AWS_REGION: 'us-east-1'
  ECR_REGISTRY: '<account-id>.dkr.ecr.us-east-1.amazonaws.com'
  ECR_REPOSITORY: 'dependencytrack/backend/dependencytrack-apiserver'
  AWS_SERVICE_CONNECTION: '<aws-service-connection>'
  DT_URL: '<dependency-track-url>'
  ECS_CLUSTER: 'dependencytrack-cluster'
  ECS_SERVICE: 'dependencytrack-service'
  # API_KEY: set as a secret variable in pipeline settings

stages:
  - stage: Build
    displayName: Build Docker Image
    jobs:
      - job: Build
        steps:
          - task: NodeTool@0
            displayName: Set up Node.js
            inputs:
              versionSpec: '20.x'

          - task: AWSShellScript@1
            displayName: Build Docker image
            inputs:
              awsCredentials: $(AWS_SERVICE_CONNECTION)
              regionName: $(AWS_REGION)
              scriptType: inline
              inlineScript: |
                aws ecr get-login-password --region $(AWS_REGION) | \
                  docker login --username AWS --password-stdin $(ECR_REGISTRY)
                docker build -t $(ECR_REGISTRY)/$(ECR_REPOSITORY):$(Build.BuildId) .

  - stage: SAST
    displayName: SAST - Semgrep
    dependsOn: []
    jobs:
      - job: Semgrep
        steps:
          - script: |
              docker run --rm \
                -v $(Build.SourcesDirectory):/src \
                -v $(Build.ArtifactStagingDirectory):/output \
                semgrep/semgrep \
                semgrep scan \
                --config p/javascript \
                --config p/nodejs \
                --config p/owasp-top-ten \
                --severity ERROR \
                --junit-xml \
                --output /output/semgrep-results.xml \
                /src/src
            displayName: Run Semgrep SAST scan

          - task: PublishTestResults@2
            displayName: Publish Semgrep SAST results
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: '$(Build.ArtifactStagingDirectory)/semgrep-results.xml'
              testRunTitle: 'Semgrep SAST Scan'

  - stage: Scan
    displayName: Security Scan
    dependsOn: Build
    jobs:
      - job: Trivy
        steps:
          - task: AWSShellScript@1
            displayName: Login to ECR
            inputs:
              awsCredentials: $(AWS_SERVICE_CONNECTION)
              regionName: $(AWS_REGION)
              scriptType: inline
              inlineScript: |
                aws ecr get-login-password --region $(AWS_REGION) | \
                  docker login --username AWS --password-stdin $(ECR_REGISTRY)

          - script: |
              docker run --rm \
                -v /var/run/docker.sock:/var/run/docker.sock \
                -v $(Build.ArtifactStagingDirectory):/output \
                aquasec/trivy:latest image \
                --exit-code 1 \
                --severity CRITICAL \
                --no-progress \
                --format template \
                --template "@/contrib/junit.tpl" \
                --output /output/trivy-results.xml \
                $(ECR_REGISTRY)/$(ECR_REPOSITORY):$(Build.BuildId)
            displayName: Trivy image scan

          - task: PublishTestResults@2
            displayName: Publish Trivy scan results
            condition: always()
            inputs:
              testResultsFormat: JUnit
              testResultsFiles: '$(Build.ArtifactStagingDirectory)/trivy-results.xml'
              testRunTitle: 'Trivy Image Scan'

      - job: SBOM
        steps:
          - task: NodeTool@0
            displayName: Set up Node.js
            inputs:
              versionSpec: '20.x'

          - script: npm install
            displayName: Install dependencies
            workingDirectory: src

          - script: npx @cyclonedx/cdxgen -o ../bom.json --spec-version 1.4 .
            displayName: Generate SBOM
            workingDirectory: src

          - script: |
              curl -X POST "$(DT_URL)/api/v1/bom" \
                -H "X-Api-Key: $(API_KEY)" \
                -F "autoCreate=false" \
                -F "projectName=node-app" \
                -F "projectVersion=1.0.0" \
                -F "bom=@bom.json"
            displayName: Upload SBOM to Dependency-Track

  - stage: Push
    displayName: Push to ECR
    dependsOn:
      - Scan
      - SAST
    jobs:
      - job: Push
        steps:
          - task: AWSShellScript@1
            displayName: Push Docker image to ECR
            inputs:
              awsCredentials: $(AWS_SERVICE_CONNECTION)
              regionName: $(AWS_REGION)
              scriptType: inline
              inlineScript: |
                aws ecr get-login-password --region $(AWS_REGION) | \
                  docker login --username AWS --password-stdin $(ECR_REGISTRY)
                docker push $(ECR_REGISTRY)/$(ECR_REPOSITORY):$(Build.BuildId)

  - stage: Deploy
    displayName: Deploy to ECS
    dependsOn: Push
    jobs:
      - job: Deploy
        steps:
          - task: AWSShellScript@1
            displayName: Deploy to ECS
            inputs:
              awsCredentials: $(AWS_SERVICE_CONNECTION)
              regionName: $(AWS_REGION)
              scriptType: inline
              inlineScript: |
                aws ecs update-service \
                  --cluster $(ECS_CLUSTER) \
                  --service $(ECS_SERVICE) \
                  --force-new-deployment
                aws ecs wait services-stable \
                  --cluster $(ECS_CLUSTER) \
                  --services $(ECS_SERVICE)
