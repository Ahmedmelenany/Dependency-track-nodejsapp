name: Generate and Upload SBOM

on:
  push:
    branches:
      - main

jobs:
  sbom:
    name: Generate and Upload SBOM
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: src
        run: npm install

      - name: Generate SBOM
        working-directory: src
        run: npx @cyclonedx/cdxgen -o ../bom.json --spec-version 1.4 .

      - name: Upload SBOM to Dependency-Track
        run: |
          curl -X POST "${{ secrets.DT_URL }}/api/v1/bom" \
            -H "X-Api-Key: ${{ secrets.API_KEY }}" \
            -F "autoCreate=false" \
            -F "projectName=node-app" \
            -F "projectVersion=1.0.0" \
            -F "bom=@bom.json"
